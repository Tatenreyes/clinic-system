{% extends 'clinic/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <h2 class="text-2xl font-bold text-gray-800 mb-6">{{ title }}</h2>
  <div class="bg-white rounded-2xl shadow p-8">
    <form method="post" class="space-y-5">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
        {% endif %}
      </div>
      {% endfor %}
      <div class="flex gap-3 pt-4">
        <button type="submit" class="px-6 py-2 bg-green-700 text-white rounded-lg hover:bg-green-800 font-semibold transition">Save</button>
        <a href="{% url 'doctor_list' %}" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-semibold transition">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
