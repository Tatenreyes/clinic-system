{% extends 'clinic/base.html' %}
{% block title %}Delete {{ type }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-2xl shadow p-8 text-center">
    <div class="text-5xl mb-4">⚠️</div>
    <h2 class="text-2xl font-bold text-gray-800 mb-2">Delete {{ type }}</h2>
    <p class="text-gray-500 mb-6">Are you sure you want to delete <strong>{{ object }}</strong>? This cannot be undone.</p>
    <form method="post" class="flex gap-3 justify-center">
      {% csrf_token %}
      <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-semibold transition">Yes, Delete</button>
      <a href="javascript:history.back()" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-semibold transition">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
